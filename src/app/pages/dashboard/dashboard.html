<div class="dashboard">

  <!-- Animated Background -->
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <!-- Sidebar -->

  <aside
    class="sidebar"
    [class.show]="sidebarOpen">

    <div class="logo">
      🚀 TaskPilot AI
    </div>

    <div class="menu-item active">
      <mat-icon>dashboard</mat-icon>
      Dashboard
    </div>

    <div class="menu-item">
      <mat-icon>task</mat-icon>
      Tasks
    </div>

    <div class="menu-item">
      <mat-icon>smart_toy</mat-icon>
      AI Planner
    </div>

    <div class="menu-item">
      <mat-icon>analytics</mat-icon>
      Analytics
    </div>

    <div class="menu-item">
      <mat-icon>person</mat-icon>
      Profile
    </div>

  </aside>

  <!-- Main Area -->

  <div class="main-content">

    <mat-toolbar class="navbar">

      <button
        mat-icon-button
        (click)="toggleSidebar()">

        <mat-icon>menu</mat-icon>

      </button>

      <span class="title">
        Dashboard
      </span>

      <span class="spacer"></span>

      <button mat-icon-button>
        <mat-icon>notifications</mat-icon>
      </button>

      <button mat-icon-button>
        <mat-icon>account_circle</mat-icon>
      </button>

    </mat-toolbar>

    <!-- Hero Section -->

    <section class="hero">

      <div>

        <h1>
          Welcome Back, Geethika 👋
        </h1>

        <p>
          Plan Smarter • Work Faster • Achieve More
        </p>

        <button
          mat-raised-button
          class="hero-btn">

          Start Planning

        </button>

      </div>

      <div class="ai-orb">
        🤖
      </div>

    </section>

  </div>

</div>
