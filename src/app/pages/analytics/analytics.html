<div class="analytics-page">

  <div class="analytics-header">

    <div>
      <h1>📊 Analytics Dashboard</h1>
      <p>Track productivity and task performance</p>
    </div>

  </div>

  <!-- Stats -->

  <div class="stats-grid">

    <div class="stat-card">
      <span>Total Tasks</span>
      <h2>24</h2>
    </div>

    <div class="stat-card">
      <span>Completed</span>
      <h2>18</h2>
    </div>

    <div class="stat-card">
      <span>In Progress</span>
      <h2>4</h2>
    </div>

    <div class="stat-card">
      <span>Overdue</span>
      <h2>2</h2>
    </div>

  </div>

  <!-- Charts -->

  <div class="chart-grid">

    <div class="chart-card">

      <h2>Weekly Productivity</h2>

      <div class="bars">

        <div class="bar" style="height:60%">
          <span>M</span>
        </div>

        <div class="bar" style="height:80%">
          <span>T</span>
        </div>

        <div class="bar" style="height:55%">
          <span>W</span>
        </div>

        <div class="bar" style="height:90%">
          <span>T</span>
        </div>

        <div class="bar" style="height:75%">
          <span>F</span>
        </div>

        <div class="bar" style="height:100%">
          <span>S</span>
        </div>

        <div class="bar" style="height:70%">
          <span>S</span>
        </div>

      </div>

    </div>

    <!-- Pie Chart -->

    <div class="chart-card">

      <h2>Task Categories</h2>

      <div class="pie-chart">

        <div class="pie-circle"></div>

      </div>

      <div class="legend">

        <div>🟣 Development</div>
        <div>🔵 Testing</div>
        <div>🟢 Documentation</div>

      </div>

    </div>

  </div>

  <!-- Productivity -->

  <div class="chart-card">

    <h2>Monthly Productivity Trend</h2>

    <div class="line-chart">

      <div class="line"></div>

    </div>

  </div>

  <!-- Priority -->

  <div class="chart-card">

    <h2>Task Priority Distribution</h2>

    <div class="priority-grid">

      <div class="priority high">
        High
      </div>

      <div class="priority medium">
        Medium
      </div>

      <div class="priority low">
        Low
      </div>

    </div>

  </div>

</div>
